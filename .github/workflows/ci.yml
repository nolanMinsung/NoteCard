name: CI

on:
  # Runs on every push EXCEPT main and release branches.
  # main is protected via PR review; release/** is handled by release.yml.
  push:
    branches-ignore:
      - main
      - "release/**"

# When a new push arrives on the same branch, cancel the previous in-flight run.
# Saves runner time on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test (all modules)
    runs-on: macos-15
    timeout-minutes: 30

    env:
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (latest-stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install Tuist
        run: brew install tuist

      - name: Cache Tuist dependencies
        uses: actions/cache@v4
        with:
          path: |
            Tuist/.build
            .build
            ~/Library/Caches/tuist
          key: tuist-${{ runner.os }}-${{ hashFiles('Tuist/Package.swift', 'Tuist/Package.resolved') }}
          restore-keys: |
            tuist-${{ runner.os }}-

      - name: Tuist install + generate
        run: |
          tuist install
          tuist generate --no-open

      - name: Test — 전체 모듈 테스트 (자동 순회)
        run: |
          set -euo pipefail
          # 스킴을 지정하지 않은 `tuist test`는 Tuist가 생성한 워크스페이스 스킴
          # (NoteCard-Workspace)의 모든 testable 타겟을 테스트한다. 각 모듈의
          # 의존 그래프를 함께 빌드하므로 앱 컴파일 검증도 겸한다.
          # module(hasTests: true)로 새 모듈이 추가되면 Tuist가 스킴을
          # 재생성하므로 CI 수정 없이 자동으로 포함된다.
          tuist test --device "iPhone 17 Pro" -- CODE_SIGNING_ALLOWED=NO
